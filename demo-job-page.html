<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Google - Software Engineer Intern</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 40px;
        }

        .card {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        }

        .pill {
            display: inline-block;
            background: #e5e7eb;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        h1 { margin: 0 0 8px; }

        .meta {
            color: #4b5563;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 14px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 4px;
        }

        input[type=text],
        input[type=email],
        input[type=tel],
        input[type=url] {
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #3b82f6; }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .submit-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }

        .success {
            margin-top: 18px;
            padding: 12px;
            border-radius: 10px;
            background: #dcfce7;
            color: #166534;
            display: none;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="pill">Demo Job Page</div>

    <h1 data-hiretrack-company>Google</h1>
    <div class="meta">
        <span data-hiretrack-role>Software Engineer Intern</span> ·
        <span data-hiretrack-location>Mountain View, CA</span>
    </div>

    <form id="applyForm">
        <div class="row">
            <div class="form-group">
                <label for="firstname">First Name</label>
                <input type="text" id="firstname" name="firstname" placeholder="First name" />
            </div>
            <div class="form-group">
                <label for="lastname">Last Name</label>
                <input type="text" id="lastname" name="lastname" placeholder="Last name" />
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" />
        </div>

        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" placeholder="(555) 000-0000" />
        </div>

        <div class="form-group">
            <label for="city">City / Location</label>
            <input type="text" id="city" name="city" placeholder="City, State" />
        </div>

        <div class="form-group">
            <label for="linkedin">LinkedIn URL</label>
            <input type="url" id="linkedin" name="linkedin" placeholder="https://linkedin.com/in/..." />
        </div>

        <div class="form-group">
            <label for="github">GitHub URL</label>
            <input type="url" id="github" name="github" placeholder="https://github.com/..." />
        </div>

        <div class="form-group">
            <label for="website">Portfolio / Website</label>
            <input type="url" id="website" name="website" placeholder="https://yoursite.com" />
        </div>

        <button class="submit-btn" type="submit" data-hiretrack-submit>Submit Application</button>
    </form>

    <div id="successMessage" class="success" data-hiretrack-success>
        Application submitted successfully!
    </div>
</div>

<script>
    document.getElementById("applyForm").addEventListener("submit", (e) => {
        e.preventDefault();
        document.getElementById("successMessage").style.display = "block";
    });
</script>
</body>
</html>
