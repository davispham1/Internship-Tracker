<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Google - Software Engineer Intern</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 40px;
        }

        .card {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        }

        .pill {
            display: inline-block;
            background: #e5e7eb;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        h1 {
            margin: 0 0 8px;
        }

        .meta {
            color: #4b5563;
            margin-bottom: 20px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }

        .success {
            margin-top: 18px;
            padding: 12px;
            border-radius: 10px;
            background: #dcfce7;
            color: #166534;
            display: none;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="pill">Demo Job Page</div>

    <h1 data-hiretrack-company>Google</h1>
    <div class="meta">
        <span data-hiretrack-role>Software Engineer Intern</span> ·
        <span data-hiretrack-location>Mountain View, CA</span>
    </div>

    <p>
        This is a demo page for HireTrack. Click the button below to simulate
        submitting a job application.
    </p>

    <button id="applyBtn" data-hiretrack-submit>Submit Application</button>

    <div
            id="successMessage"
            class="success"
            data-hiretrack-success
    >
        Application submitted successfully.
    </div>
</div>

<script>
    document.getElementById("applyBtn").addEventListener("click", () => {
        document.getElementById("successMessage").style.display = "block";
    });
</script>
</body>
</html>
